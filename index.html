<!doctype html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>𝕲𝖊𝖔𝖗𝖌𝖊𝖘 𝕬𝖘𝖍𝖗𝖆𝖋 ⃝ 🇪🇬</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
transition:.3s;
}

body{
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:#fff;
min-height:100vh;
}

/* كروت زجاجية */
.card{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(12px);
border-radius:20px;
padding:2rem;
box-shadow:0 0 30px rgba(0,0,0,.4);
margin-bottom:2rem;
}

/* الصورة */
.profile-img{
width:170px;
height:170px;
border-radius:50%;
display:block;
margin:auto;
border:3px solid #00c6ff;
}

/* الاسم */
h1{
text-align:center;
margin:15px 0;
font-size:28px;
}

/* لينكات */
.social-link{
display:flex;
justify-content:center;
align-items:center;
padding:12px;
border-radius:12px;
margin-top:10px;
text-decoration:none;
font-weight:bold;
background:#25D366;
color:#fff;
}

.social-link:hover{
transform:scale(1.05);
}

/* grid */
.social-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
}

/* كارت سوشيال */
.social-card{
padding:20px;
border-radius:15px;
text-align:center;
color:#fff;
font-weight:bold;
}

.social-card:hover{
transform:translateY(-6px) scale(1.03);
}

/* ألوان */
.facebook-bg{background:#1877f2;}
.tiktok-bg{background:#000;}
.whatsapp-bg{background:#25D366;}
.instagram-bg{background:linear-gradient(45deg,#f09433,#dc2743);}

/* زرار */
button{
padding:12px;
border:none;
border-radius:10px;
background:#00c6ff;
color:#fff;
cursor:pointer;
width:100%;
}

/* Scroll top */
#topBtn{
position:fixed;
bottom:20px;
right:20px;
background:#00c6ff;
border:none;
padding:10px;
border-radius:50%;
display:none;
cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

<div class="card">
<img src="https://i.pinimg.com/736x/57/2f/9d/572f9db32717dfc90fa2dbb688ca201d.jpg" class="profile-img">

<h1>𝕲𝖊𝖔𝖗𝖌𝖊𝖘 𝕬𝖘𝖍𝖗𝖆𝖋 ⃝ 🇪🇬</h1>

<a href="https://chat.whatsapp.com/HlWChtsbTAhKe5hBsKwiVl" class="social-link">
<i class="fab fa-whatsapp"></i> انضم للجروب
</a>
</div>

<div class="card">
<h2 style="text-align:center;">مواقع التواصل</h2>

<div class="social-grid">

<a href="https://tiktok.com/@1devil2slayer" class="social-card tiktok-bg">
<i class="fab fa-tiktok"></i>
<p>@1devil2slayer</p>
</a>

<a href="https://wa.me/201208898875" class="social-card whatsapp-bg">
<i class="fab fa-whatsapp"></i>
<p>راسلني</p>
</a>

<a href="https://www.facebook.com/profile.php?id=100063618740750&locale=ar_AR" class="social-card facebook-bg">
<i class="fab fa-facebook-f"></i>
<p>Facebook</p>
</a>

<a href="https://instagram.com/yourprofile" class="social-card instagram-bg">
<i class="fab fa-instagram"></i>
<p>Instagram</p>
</a>

</div>
</div>

</div>

<button id="topBtn"><i class="fas fa-arrow-up"></i></button>

<script>
// زرار الرجوع لفوق
let btn=document.getElementById("topBtn");

window.onscroll=function(){
btn.style.display=window.scrollY>200?"block":"none";
};

btn.onclick=function(){
window.scrollTo({top:0,behavior:"smooth"});
};
</script>

</body>
</html>
